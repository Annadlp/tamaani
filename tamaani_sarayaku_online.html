<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TAMAANI · Кейс Сараяку</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,500;0,700;0,800;1,500&family=Alegreya+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --forest-deep:#0E2117;
  --forest:#16311F;
  --forest-panel:#1B3A26;
  --forest-line:#2C5136;
  --paper:#F0E8D3;
  --paper-dim:#B9C2A6;
  --paper-faint:#8B987E;
  --achiote:#E0532F;      /* компания / давление проекта */
  --achiote-soft:#F0794F;
  --river:#5FA8A0;        /* община */
  --river-soft:#8AC7BE;
  --kapok:#E4C97E;        /* нарушения / акценты */
  --danger-zone:#7E2A16;
  --safe-zone:#3F7A4C;
  --serif:"Alegreya", Georgia, "Times New Roman", serif;
  --sans:"Alegreya Sans", "Segoe UI", system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--forest-deep);
  color:var(--paper);
  font-family:var(--sans);
  font-size:18px;
  line-height:1.55;
  min-height:100vh;
}
body::before{ /* тонкая текстура тропического полога */
  content:"";position:fixed;inset:0;pointer-events:none;opacity:.5;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 15% -5%, rgba(95,168,160,.10), transparent 60%),
    radial-gradient(ellipse 50% 35% at 90% 0%, rgba(228,201,126,.07), transparent 60%);
}
#app{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:0 20px 90px}

/* ---------- шапка ---------- */
header.masthead{padding:26px 0 10px;display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap}
.masthead h1{
  font-family:var(--serif);font-weight:800;font-size:30px;letter-spacing:.04em;line-height:1.1;
}
.masthead h1 small{
  display:block;font-family:var(--sans);font-weight:500;font-size:13px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--kapok);margin-bottom:6px;
}
.masthead .case{color:var(--paper-dim);font-size:14px;margin-left:auto;text-align:right;max-width:280px}
.masthead svg{flex:none}

/* ---------- панель состояния ---------- */
.dash{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg, var(--forest-deep) 82%, transparent);
  padding:12px 0 18px;
}
.dash-inner{
  background:var(--forest);border:1px solid var(--forest-line);border-radius:14px;
  padding:16px 18px 14px;box-shadow:0 8px 30px rgba(0,0,0,.35);
}
.gauge-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.gauge-head .glabel{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--paper-dim)}
.gauge-head .gval{font-family:var(--serif);font-size:26px;font-weight:800}
.gauge-head .gval .of{font-size:15px;color:var(--paper-faint);font-weight:500}
.gauge-head .gdelta{font-family:var(--serif);font-weight:800;font-size:18px;margin-left:10px;opacity:0;transition:opacity .3s}
.gauge-head .gdelta.show{opacity:1}
.gauge-head .gdelta.up{color:var(--achiote-soft)}
.gauge-head .gdelta.down{color:var(--river-soft)}

.gauge{position:relative;height:30px;border-radius:8px;overflow:hidden;background:#122B1C;border:1px solid var(--forest-line)}
.gauge .zone{position:absolute;top:0;bottom:0}
.gauge .zone.safe{left:0;width:20%;background:linear-gradient(90deg, rgba(63,122,76,.55), rgba(63,122,76,.15))}
.gauge .zone.hot{right:0;width:16%;background:linear-gradient(90deg, rgba(126,42,22,.15), rgba(126,42,22,.75))}
.gauge .fill{
  position:absolute;left:0;top:0;bottom:0;
  background:linear-gradient(90deg, rgba(224,83,47,.28), rgba(224,83,47,.72));
  transition:width .7s cubic-bezier(.25,.9,.3,1.15);
}
.gauge .marker{
  position:absolute;top:-2px;bottom:-2px;width:4px;background:var(--paper);border-radius:2px;
  box-shadow:0 0 10px rgba(240,232,211,.6);
  transition:left .7s cubic-bezier(.25,.9,.3,1.15);
}
.gauge .tick{position:absolute;top:0;bottom:0;width:1px;background:rgba(240,232,211,.14)}
.gauge-legend{display:flex;justify-content:space-between;font-size:12px;color:var(--paper-faint);margin-top:5px}
.gauge-legend .end{color:var(--achiote-soft)}
.gauge-legend .start{color:#8FCB9B}

.dash-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.res{
  flex:1;min-width:120px;background:var(--forest-panel);border:1px solid var(--forest-line);
  border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:10px;
}
.res svg{flex:none;opacity:.9}
.res .rname{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--paper-dim)}
.res .rpips{display:flex;gap:4px;margin-top:3px}
.res .pip{width:14px;height:8px;border-radius:3px;background:var(--river);transition:all .3s}
.res .pip.off{background:transparent;border:1px solid var(--forest-line)}
.res.drained .rname{color:var(--achiote-soft)}

.vio-strip{margin-top:12px}
.vio-strip .vhead{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--paper-dim);margin-bottom:6px;display:flex;gap:8px;align-items:center}
.vio-strip .vcount{font-family:var(--serif);font-weight:800;font-size:16px;color:var(--kapok)}
.vio-tags{display:flex;flex-wrap:wrap;gap:6px}
.vio-tag{
  font-size:13px;padding:4px 10px;border-radius:99px;border:1px solid rgba(228,201,126,.5);
  color:var(--kapok);background:rgba(228,201,126,.07);
}
.vio-none{font-size:14px;color:var(--paper-faint);font-style:italic}
.crisis{
  margin-top:10px;padding:8px 12px;border-radius:8px;font-weight:700;
  background:rgba(224,83,47,.15);border:1px solid rgba(224,83,47,.6);color:var(--achiote-soft);
  animation:pulse-crisis 1.6s ease-in-out infinite;
}
@keyframes pulse-crisis{50%{background:rgba(224,83,47,.28)}}
@media (prefers-reduced-motion: reduce){
  *{transition:none!important;animation:none!important}
}

/* ---------- сцена ---------- */
main .scene{
  background:var(--forest);border:1px solid var(--forest-line);border-radius:14px;
  padding:30px 32px 28px;margin-top:8px;animation:scene-in .45s ease both;
}
@keyframes scene-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.eyebrow{
  font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--kapok);
  display:flex;gap:12px;align-items:center;margin-bottom:10px;flex-wrap:wrap;
}
.eyebrow .stage{color:var(--paper-faint);letter-spacing:.1em}
.scene h2{font-family:var(--serif);font-weight:800;font-size:32px;line-height:1.15;margin-bottom:16px}
.scene p{margin-bottom:14px;color:var(--paper)}
.scene p.dim{color:var(--paper-dim)}
.recognize{
  border-left:3px solid var(--river);padding:10px 16px;margin:18px 0;
  background:rgba(95,168,160,.08);border-radius:0 10px 10px 0;color:var(--river-soft);font-size:16px;
}
.recognize b{color:var(--paper);display:block;font-size:12px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:4px}
.drift-note{
  display:flex;align-items:center;gap:10px;margin:16px 0;padding:10px 14px;border-radius:10px;
  background:rgba(224,83,47,.09);border:1px dashed rgba(224,83,47,.45);color:var(--achiote-soft);font-size:15px;
}
.drift-note b{font-family:var(--serif);font-size:19px}

.choices{display:flex;flex-direction:column;gap:10px;margin-top:22px}
.choices h3{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:2px}
.choice{
  text-align:left;font-family:var(--sans);font-size:17px;color:var(--paper);cursor:pointer;
  background:var(--forest-panel);border:1px solid var(--forest-line);border-radius:12px;
  padding:14px 16px;transition:border-color .15s, transform .12s, background .15s;
  display:flex;gap:14px;align-items:flex-start;width:100%;
}
.choice:hover{transform:translateX(4px)}
.choice:focus-visible{outline:2px solid var(--kapok);outline-offset:2px}
.choice .cbadge{
  flex:none;font-family:var(--serif);font-weight:800;font-size:16px;width:34px;height:34px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;margin-top:2px;
}
.choice .ctext .clabel{font-weight:500;line-height:1.4}
.choice .ctext .csub{font-size:13.5px;color:var(--paper-faint);margin-top:4px}
.choice .cdp{margin-left:auto;flex:none;font-family:var(--serif);font-weight:800;font-size:17px;align-self:center;min-width:44px;text-align:right}

.choice.company:hover{border-color:var(--achiote)}
.choice.company .cbadge{background:rgba(224,83,47,.16);color:var(--achiote-soft);border:1px solid rgba(224,83,47,.4)}
.choice.company .cdp.up{color:var(--achiote-soft)}
.choice.company .cdp.down{color:var(--river-soft)}
.choice.community:hover{border-color:var(--river)}
.choice.community .cbadge{background:rgba(95,168,160,.14);color:var(--river-soft);border:1px solid rgba(95,168,160,.4)}
.choice.community .cdp{color:var(--river-soft)}
.choice.disabled{opacity:.38;cursor:not-allowed}
.choice.disabled:hover{transform:none;border-color:var(--forest-line)}

.actor-tag{font-size:12px;letter-spacing:.18em;text-transform:uppercase;padding:3px 10px;border-radius:99px;font-weight:700}
.actor-tag.company{background:rgba(224,83,47,.15);color:var(--achiote-soft);border:1px solid rgba(224,83,47,.4)}
.actor-tag.community{background:rgba(95,168,160,.14);color:var(--river-soft);border:1px solid rgba(95,168,160,.4)}

.effects{display:flex;flex-direction:column;gap:8px;margin:18px 0}
.eff{display:flex;gap:10px;align-items:baseline;font-size:16px}
.eff .esign{font-family:var(--serif);font-weight:800;flex:none;width:52px;text-align:right}
.eff.up .esign{color:var(--achiote-soft)}
.eff.down .esign{color:var(--river-soft)}
.eff.vio-open .esign{color:var(--kapok)}
.eff.vio-close .esign{color:#8FCB9B}
.eff .edesc{color:var(--paper-dim)}

.lesson{
  border-left:3px solid var(--kapok);padding:10px 16px;margin:16px 0;
  background:rgba(228,201,126,.06);border-radius:0 10px 10px 0;color:var(--paper-dim);font-size:16px;
}
.lesson b{color:var(--kapok);display:block;font-size:12px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:4px}

.nav-btns{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}
.btn{
  font-family:var(--sans);font-size:16px;font-weight:700;cursor:pointer;border-radius:11px;
  padding:12px 22px;border:1px solid var(--forest-line);background:var(--forest-panel);color:var(--paper);
  transition:transform .12s, border-color .15s;
}
.btn:hover{transform:translateY(-1px);border-color:var(--river)}
.btn:focus-visible{outline:2px solid var(--kapok);outline-offset:2px}
.btn.primary{background:var(--river);border-color:var(--river);color:#0C231D}
.btn.primary:hover{border-color:var(--river-soft);background:var(--river-soft)}
.btn.ghost{background:transparent;color:var(--paper-dim);font-weight:500}
.btn.danger{border-color:rgba(224,83,47,.5);color:var(--achiote-soft)}

.debrief-q{
  margin-top:22px;padding:16px 18px;border-radius:12px;background:var(--forest-panel);
  border:1px solid var(--forest-line);
}
.debrief-q b{display:block;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--paper-dim);margin-bottom:8px}
.debrief-q p{font-family:var(--serif);font-size:19px;font-style:italic;color:var(--paper);margin:0}

/* ---------- финал ---------- */
.verdict{
  font-family:var(--serif);font-size:24px;font-weight:800;line-height:1.3;
  padding:18px 20px;border-radius:12px;margin:18px 0;
}
.verdict.win{background:rgba(63,122,76,.2);border:1px solid var(--safe-zone);color:#B9E4C0}
.verdict.loss{background:rgba(126,42,22,.25);border:1px solid var(--achiote);color:var(--achiote-soft)}
.verdict.mid{background:rgba(228,201,126,.08);border:1px solid rgba(228,201,126,.5);color:var(--kapok)}
.final-list{list-style:none;margin:12px 0}
.final-list li{padding:6px 0;border-bottom:1px dashed var(--forest-line);display:flex;justify-content:space-between;gap:16px}
.final-list li:last-child{border:none}
ol.debrief{margin:12px 0 4px 22px}
ol.debrief li{margin-bottom:8px;font-size:17px}
.epilogue{
  margin-top:22px;padding:18px 20px;border-radius:12px;border:1px solid rgba(228,201,126,.4);
  background:rgba(228,201,126,.05);
}
.epilogue b{display:block;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--kapok);margin-bottom:8px}
.epilogue p{font-family:var(--serif);font-size:18px;line-height:1.6}

/* ---------- журнал ---------- */
.log-wrap{margin-top:18px}
.log-toggle{width:100%;text-align:left}
.log{
  margin-top:10px;background:var(--forest);border:1px solid var(--forest-line);border-radius:12px;
  padding:14px 18px;max-height:320px;overflow-y:auto;font-size:15px;
}
.log .lrow{display:flex;gap:12px;padding:6px 0;border-bottom:1px dashed var(--forest-line)}
.log .lrow:last-child{border:none}
.log .lround{flex:none;width:26px;font-family:var(--serif);font-weight:800;color:var(--paper-faint)}
.log .lwho{flex:none;width:86px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding-top:2px}
.log .lwho.company{color:var(--achiote-soft)}
.log .lwho.community{color:var(--river-soft)}
.log .lwho.system{color:var(--paper-faint)}
.log .ltext{color:var(--paper-dim)}
.log .ldp{margin-left:auto;flex:none;font-family:var(--serif);font-weight:800}
.log .ldp.up{color:var(--achiote-soft)}
.log .ldp.down{color:var(--river-soft)}

/* ---------- панель фасилитатора ---------- */
.fac-fab{
  position:fixed;right:18px;bottom:18px;z-index:80;width:46px;height:46px;border-radius:50%;
  background:var(--forest-panel);border:1px solid var(--forest-line);color:var(--paper-dim);
  font-size:20px;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.4);
}
.fac-fab:hover{color:var(--kapok);border-color:var(--kapok)}
.fac{
  position:fixed;right:18px;bottom:74px;z-index:80;width:320px;max-height:74vh;overflow-y:auto;
  background:#12281B;border:1px solid var(--kapok);border-radius:14px;padding:16px;display:none;
  box-shadow:0 12px 40px rgba(0,0,0,.55);font-size:14px;
}
.fac.open{display:block}
.fac h4{font-family:var(--serif);font-size:17px;color:var(--kapok);margin-bottom:10px}
.fac .fsec{margin-bottom:14px;padding-bottom:12px;border-bottom:1px dashed var(--forest-line)}
.fac .fsec:last-child{border:none;margin-bottom:0;padding-bottom:0}
.fac .flabel{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--paper-faint);margin-bottom:6px}
.fac .frow{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.fac .fbtn{
  font-size:13px;padding:4px 10px;border-radius:7px;cursor:pointer;
  background:var(--forest-panel);border:1px solid var(--forest-line);color:var(--paper);
}
.fac .fbtn:hover{border-color:var(--kapok)}
.fac .fname{flex:1;color:var(--paper-dim)}
.fac .vtoggle{display:flex;align-items:center;gap:8px;padding:3px 0;cursor:pointer;color:var(--paper-dim)}
.fac .vtoggle input{accent-color:var(--kapok)}

footer{margin-top:40px;font-size:13px;color:var(--paper-faint);text-align:center;line-height:1.6}

@media (max-width:640px){
  body{font-size:16px}
  .dash{position:static;padding-bottom:10px}
  main .scene{padding:20px 18px}
  .scene h2{font-size:25px}
  .masthead .case{display:none}
  .choice .cdp{display:none}
}
</style>
</head>
<body>
<div id="app">
  <header class="masthead">
    <svg width="54" height="54" viewBox="0 0 54 54" aria-hidden="true">
      <!-- солнце зенита + река: Сараяку — «народ полудня» на реке Бобонаса -->
      <circle cx="27" cy="20" r="9" fill="none" stroke="#E4C97E" stroke-width="2.4"/>
      <g stroke="#E4C97E" stroke-width="2.2" stroke-linecap="round">
        <line x1="27" y1="4" x2="27" y2="8"/><line x1="41" y1="20" x2="45" y2="20"/>
        <line x1="9" y1="20" x2="13" y2="20"/><line x1="37" y1="10" x2="40" y2="7"/>
        <line x1="14" y1="7" x2="17" y2="10"/>
      </g>
      <path d="M6 38 Q14 33 22 38 T38 38 T54 38" fill="none" stroke="#5FA8A0" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M2 46 Q10 41 18 46 T34 46 T50 46" fill="none" stroke="#5FA8A0" stroke-width="2.6" stroke-linecap="round" opacity=".55"/>
    </svg>
    <h1><small>Переговорная игра · СПОС / FPIC</small>TAMAANI: Кейс Сараяку</h1>
    <div class="case">По материалам дела<br><i>Kichwa Sarayaku v. Ecuador</i>,<br>Межамериканский суд, 2012</div>
  </header>

  <div class="dash" id="dash"></div>
  <main id="main"></main>

  <div class="log-wrap">
    <button class="btn ghost log-toggle" id="logToggle" aria-expanded="false">▸ Журнал партии (для дебрифа)</button>
    <div class="log" id="log" hidden></div>
  </div>

  <footer>Онлайн-версия для игры с фасилитатором · шкала проекта 0–50 · нажмите ⚙ для панели фасилитатора</footer>
</div>

<button class="fac-fab" id="facFab" title="Панель фасилитатора" aria-label="Панель фасилитатора">⚙</button>
<div class="fac" id="fac" role="dialog" aria-label="Панель фасилитатора"></div>

<script>
/* ============================================================
   TAMAANI: Кейс Сараяку — данные игры
   Реальные ситуации по мотивам дела Kichwa Sarayaku v. Ecuador
   (Межамериканский суд по правам человека, 27.06.2012)
   и матрицы переговорных ловушек Tamaani Matrix (T01–T08)
   ============================================================ */

const VIOLATIONS = {
  decision_before: {
    label: "Решение принято до консультаций",
    principle: "Предварительность (Prior)",
  },
  postponed: {
    label: "Консультации отложены — проект идёт",
    principle: "Предварительность (Prior)",
  },
  benefits: {
    label: "Выгоды вместо согласия",
    principle: "Свобода решения (Free)",
  },
  bad_rep: {
    label: "Сомнительное представительство",
    principle: "Легитимное представительство",
  },
  fake_community: {
    label: "Подмена общины",
    principle: "Легитимное представительство",
  },
  formal_info: {
    label: "Формальная информация вместо понимания",
    principle: "Информированность (Informed)",
  },
  access: {
    label: "Доступ к территории без согласия",
    principle: "Предварительность (Prior)",
  },
  danger: {
    label: "Опасность на территории",
    principle: "Добросовестность (Good Faith)",
  },
};

const RESOURCES = {
  law:     { label: "Право",     hint: "суды, жалобы, юридическое оспаривание" },
  info:    { label: "Информация", hint: "документы, экспертиза, перевод, фиксация фактов" },
  allies:  { label: "Союзники",  hint: "НПО, медиа, наблюдатели, внешняя поддержка" },
  support: { label: "Община",    hint: "собрания, мандат, протест, мобилизация" },
};

/* Механика:
   Шкала проекта 0–50. Старт 30. ≤10 — откат, ≥50 — точка невозврата.
   Инерция в начале раунда: +2 базово, +1 за каждое открытое нарушение.
   dp = изменение шкалы; cost = {ресурс: сколько};
   closes = [нарушения, которые закрываются]; opens = [которые открываются].
*/

const STORIES = [
  /* ---------------- ИСТОРИЯ 1 · T01 / T02 ---------------- */
  {
    id: 1,
    trap: "T01 · «Решение уже принято»",
    title: "Концессия выдана без консультаций",
    stage: "До консультаций",
    intro: `26 июля 1996 года Эквадор подписал контракт с аргентинской компанией CGC
      на разведку и добычу нефти в «Блоке 23». Около 65% блока — родовая территория

const MAX = 50, START = 30, WIN_AT = 10, CRISIS_AT = 42;
const DRIFT_BASE = 2, DRIFT_PER_VIOLATION = 1;

let S = null;

function newState(){
  return {
    project: START,
    res: { law:3, info:3, allies:3, support:3 },
    violations: new Set(["decision_before"]), // концессия уже выдана
    storyIdx: 0,
    phase: "start",           // start | story | companyResult | community | communityResult | summary | final
    chosenCompany: null,
    chosenAction: null,
    lastDelta: 0,
    driftApplied: 0,
    finalReason: null,        // "win" | "loss" | "stop"
    log: [],
  };
}

function clampProject(){ S.project = Math.max(0, Math.min(MAX, S.project)); }

function addLog(who, text, dp){
  S.log.push({ round: S.storyIdx + 1, who, text, dp: dp||0 });
  renderLog();
}

function applyDelta(dp){
  S.lastDelta = dp;
  S.project += dp;
  clampProject();
}

function story(){ return STORIES[S.storyIdx]; }

/* ---------- переходы ---------- */
function startGame(){
  S = newState();
  addLog("system", "Старт партии. Концессия на Блок 23 выдана без консультаций — проект уже на 30/50.", 0);
  S.phase = "start";
  render();
}

function goStory(idx){
  S.storyIdx = idx;
  S.phase = "story";
  S.chosenCompany = null; S.chosenAction = null;
  // инерция проекта — начиная со 2-й истории
  if (idx > 0){
    const drift = DRIFT_BASE + DRIFT_PER_VIOLATION * S.violations.size;
    S.driftApplied = drift;
    applyDelta(drift);
    addLog("system", `Инерция проекта: +${DRIFT_BASE} базово, +${DRIFT_PER_VIOLATION}×${S.violations.size} за открытые нарушения.`, drift);
  } else {
    S.driftApplied = 0; S.lastDelta = 0;
  }
  render();
}

function chooseCompany(move){
  S.chosenCompany = move;
  applyDelta(move.dp);
  (move.opens||[]).forEach(v => S.violations.add(v));
  (move.closesByCompany||[]).forEach(v => S.violations.delete(v));
  addLog("company", `${story().trap.split("·")[0].trim()} — ход ${move.key}: ${move.label}`, move.dp);
  S.phase = "companyResult";
  render();
}

function chooseAction(act){
  const affordable = Object.entries(act.cost||{}).every(([r,c]) => S.res[r] >= c);
  if (!affordable) return;
  S.chosenAction = act;
  Object.entries(act.cost||{}).forEach(([r,c]) => S.res[r] -= c);
  applyDelta(act.dp);
  (act.closes||[]).forEach(v => S.violations.delete(v));
  addLog("community", act.label, act.dp);
  S.phase = "communityResult";
  render();
}

function goSummary(){
  if (S.project >= MAX){ return goFinal("loss"); }
  if (S.project <= WIN_AT){ return goFinal("win"); }
  S.phase = "summary";
  render();
}

function goFinal(reason){
  S.finalReason = reason;
  S.phase = "final";
  addLog("system", reason === "win" ? "Финал: проект откачен, процесс можно начать заново."
        : reason === "loss" ? "Финал: точка невозврата — 50/50."
        : "Финал: партия остановлена фасилитатором для дебрифа.", 0);
  render();
}

function nextStory(){
  if (S.storyIdx + 1 >= STORIES.length) return goFinal("stop");
  goStory(S.storyIdx + 1);
}

function effLines(dp, opens, closes){
  let h = "";
  if (dp > 0) h += `<div class="eff up"><span class="esign">+${dp}</span><span class="edesc">проект продвинулся</span></div>`;
  if (dp < 0) h += `<div class="eff down"><span class="esign">${dp}</span><span class="edesc">проект откатился</span></div>`;
  if (dp === 0) h += `<div class="eff"><span class="esign">±0</span><span class="edesc">шкала проекта не изменилась</span></div>`;
  (opens||[]).forEach(v => h += `<div class="eff vio-open"><span class="esign">⚑</span><span class="edesc">открыто нарушение: <b style="color:var(--kapok)">${VIOLATIONS[v].label}</b></span></div>`);
  (closes||[]).forEach(v => h += `<div class="eff vio-close"><span class="esign">✓</span><span class="edesc">закрыто нарушение: ${VIOLATIONS[v].label}</span></div>`);
  return `<div class="effects">${h}</div>`;
}

    <div class="scene">
      <div class="eyebrow"><span class="actor-tag community">Ход общины</span> <span class="stage">· раунд ${S.storyIdx+1}</span></div>
      <h2>Как отвечает Сараяку?</h2>
      <p class="dim">Обсудите варианты. Сильные ответы стоят ресурсов — а ресурсы на всю партию.</p>
      <div class="choices">
        ${story().communityActions.map((a,i)=>{
          const afford = Object.entries(a.cost||{}).every(([r,c]) => S.res[r] >= c);
          return `
          <button class="choice community ${afford?"":"disabled"}" ${afford?`onclick="chooseAction(story().communityActions[${i}])"`:`aria-disabled="true" title="Не хватает ресурса"`}>
            <span class="cbadge">${i+1}</span>
            <span class="ctext">
              <span class="clabel">${a.label}</span>
              <span class="csub">${a.sub}${afford?"":" · ✕ не хватает ресурса"}</span>
            </span>
            <span class="cdp">${a.dp<0?a.dp:"±0"}</span>
          </button>`;}).join("")}
      </div>
    </div>`;
  }

  else if (S.phase === "communityResult"){
    const a = S.chosenAction;
    h = `
    <div class="scene">
      <div class="eyebrow"><span class="actor-tag community">Община</span></div>
      <h2>${a.label}</h2>
      <p>${a.result}</p>
      ${effLines(a.dp, [], a.closes)}
      ${Object.keys(a.cost||{}).length ? `<p class="dim">Потрачено: ${Object.entries(a.cost).map(([r,c])=>`${c} ${RESOURCES[r].label}`).join(", ")}.</p>` : ""}
      <div class="nav-btns">
        <button class="btn primary" onclick="goSummary()">Итог раунда →</button>
      </div>
    </div>`;
  }

  else if (S.phase === "summary"){
    h = `
    <div class="scene">
      <div class="eyebrow">Итог раунда ${S.storyIdx+1} <span class="stage">· ${story().trap}</span></div>
      <h2>Где мы оказались</h2>
      <p class="dim">Состояние партии — на панели выше: давление проекта, ресурсы, открытые нарушения.
      Помните: каждое открытое нарушение добавит проекту +${DRIFT_PER_VIOLATION} в начале следующего раунда.</p>
      <div class="debrief-q"><b>Вопрос раунда — обсудите</b><p>${story().debrief}</p></div>
      <div class="nav-btns">
        ${S.storyIdx + 1 < STORIES.length
          ? `<button class="btn primary" onclick="nextStory()">История ${S.storyIdx+2}: ${STORIES[S.storyIdx+1].title} →</button>`
          : `<button class="btn primary" onclick="goFinal('stop')">К финалу партии →</button>`}
        <button class="btn ghost" onclick="goFinal('stop')">Остановить партию и перейти к дебрифу</button>
      </div>
    </div>`;
  }

  else if (S.phase === "final"){
    const v = S.violations.size;
    let verdict, cls;
    if (S.finalReason === "loss"){
      cls = "loss";
      verdict = "Точка невозврата. Компания продвинула проект быстрее, чем община успела закрыть нарушения согласия. Дальше решают уже не переговоры.";
    } else if (S.finalReason === "win"){
      cls = "win";
      verdict = "Проект откачен. Община вернула процесс достаточно далеко назад, чтобы настоящая консультация могла начаться заново — свободно, предварительно и информированно.";
    } else {
      cls = "mid";
      verdict = "Процесс остался спорным. Проект не дошёл до точки невозврата, но и не был откачен. Качество согласия определяется тем, какие нарушения остались открытыми.";
    }
    let quality;
    if (v === 0) quality = "Нарушений не осталось — процесс можно считать восстановленным, если дальнейшая консультация будет свободной, предварительной и информированной.";
    else if (v === 1) quality = "Осталось одно нарушение. Процесс спорный, но его ещё можно восстановить.";
    else if (v <= 3) quality = "Осталось несколько нарушений. Формально процесс мог продолжаться, но качество согласия под вопросом.";
    else quality = "Осталось много нарушений. Это уже не согласие — это фасад согласия.";

    h = `
    <div class="scene">
      <div class="eyebrow">Финал партии</div>
      <h2>Давление проекта: ${S.project} / ${MAX}</h2>
      <div class="verdict ${cls}">${verdict}</div>
      <ul class="final-list">
        <li><span>Открытых нарушений</span><b style="color:var(--kapok)">${v}</b></li>
        ${[...S.violations].map(x=>`<li><span style="color:var(--paper-dim)">— ${VIOLATIONS[x].label}</span><span style="color:var(--paper-faint)">${VIOLATIONS[x].principle}</span></li>`).join("")}
        <li><span>Остаток ресурсов</span><span>${Object.entries(RESOURCES).map(([k,r])=>`${r.label} ${S.res[k]}`).join(" · ")}</span></li>
      </ul>
      <div class="lesson"><b>Качество согласия</b>${quality}</div>
      <div class="debrief-q"><b>Вопросы для дебрифа</b>
        <ol class="debrief">
          <li>В какой момент процесс перестал быть свободным?</li>
          <li>Что сильнее всего двигало проект вперёд — ходы компании или незакрытые нарушения?</li>
          <li>На что общине не хватило ресурсов? Что бы вы разменяли иначе?</li>
          <li>Какие нарушения остались открытыми — и почему именно они?</li>
          <li>Было ли получено согласие — или согласие пытались добыть?</li>
        </ol>
      </div>
      <div class="epilogue"><b>Как это закончилось в реальности</b><p>${EPILOGUE}</p></div>
      <div class="nav-btns">
        <button class="btn primary" onclick="startGame()">Начать партию заново</button>
      </div>
    </div>`;
  }

  $main.innerHTML = h;
  if (S.phase !== "start") window.scrollTo({top: 0});
}

function renderLog(){
  if (!S) return;
  $log.innerHTML = S.log.length
    ? [...S.log].reverse().map(l=>`
      <div class="lrow">
        <span class="lround">${l.round}</span>
        <span class="lwho ${l.who}">${l.who==="company"?"Компания":l.who==="community"?"Община":"Игра"}</span>
        <span class="ltext">${esc(l.text)}</span>
        <span class="ldp ${l.dp>0?"up":l.dp<0?"down":""}">${l.dp>0?"+"+l.dp:l.dp<0?l.dp:""}</span>
      </div>`).join("")
    : `<div class="lrow"><span class="ltext">Пока пусто.</span></div>`;
}

/* ---------- панель фасилитатора ---------- */
const $fac = document.getElementById("fac");
document.getElementById("facFab").addEventListener("click", ()=>{
  $fac.classList.toggle("open");
  if ($fac.classList.contains("open")) renderFac();
});

function facAdj(what, d){
  if (what === "project"){ S.project += d; clampProject(); S.lastDelta = d; addLog("system", `Фасилитатор: проект ${d>0?"+":""}${d}.`, d); }
  else { S.res[what] = Math.max(0, Math.min(5, S.res[what] + d)); }
  render(); renderFac();
}
function facVio(key, on){
  on ? S.violations.add(key) : S.violations.delete(key);
  render(); renderFac();
}
function facJump(i){ goStory(i); renderFac(); }

function renderFac(){
  $fac.innerHTML = `
    <h4>Панель фасилитатора</h4>
    <div class="fsec">
      <div class="flabel">Шкала проекта: ${S.project}</div>
      <div class="frow">
        <button class="fbtn" onclick="facAdj('project',-5)">−5</button>
        <button class="fbtn" onclick="facAdj('project',-1)">−1</button>
        <button class="fbtn" onclick="facAdj('project',1)">+1</button>
        <button class="fbtn" onclick="facAdj('project',5)">+5</button>
      </div>
    </div>
    <div class="fsec">
      <div class="flabel">Ресурсы</div>
      ${Object.entries(RESOURCES).map(([k,r])=>`
        <div class="frow"><span class="fname">${r.label}: ${S.res[k]}</span>
          <button class="fbtn" onclick="facAdj('${k}',-1)">−</button>
          <button class="fbtn" onclick="facAdj('${k}',1)">+</button>
        </div>`).join("")}
    </div>
    <div class="fsec">
      <div class="flabel">Нарушения</div>
      ${Object.entries(VIOLATIONS).map(([k,v])=>`
        <label class="vtoggle"><input type="checkbox" ${S.violations.has(k)?"checked":""} onchange="facVio('${k}', this.checked)"> ${v.label}</label>`).join("")}
    </div>
    <div class="fsec">
      <div class="flabel">Навигация</div>
      <div class="frow">
        ${STORIES.map((s,i)=>`<button class="fbtn" title="${s.title}" onclick="facJump(${i})">И${i+1}</button>`).join("")}
        <button class="fbtn" onclick="goFinal('stop');renderFac()">Финал</button>
        <button class="fbtn" style="border-color:rgba(224,83,47,.6);color:var(--achiote-soft)" onclick="if(confirm('Начать партию заново?')){startGame();renderFac()}">Сброс</button>
      </div>
    </div>`;
}

/* ---------- журнал: показать/скрыть ---------- */
document.getElementById("logToggle").addEventListener("click", function(){
  const open = !$log.hidden;
  $log.hidden = open;
  this.setAttribute("aria-expanded", String(!open));
  this.textContent = (open ? "▸" : "▾") + " Журнал партии (для дебрифа)";
});

function render(){ renderDash(); renderMain(); renderLog(); }

startGame();
</script>
</body>
</html>
